apiVersion: v1
kind: Service
metadata:
  name: {{ include "ipl-voter.fullname" . }}
  labels:
    {{- include "ipl-voter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "ipl-voter.selectorLabels" . | nindent 4 }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
      nodePort: {{ .Values.service.nodePort }}