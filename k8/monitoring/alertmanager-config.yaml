apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: ipl-voter-alertmanager-config
  namespace: monitoring
spec:
  route:
    receiver: 'email-alert'
    groupBy: ['alertname']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 1h

  receivers:
    - name: 'email-alert'
      emailConfigs:
        - to: 'sdr15024@gmail.com'        
          from: 'drs15024@gmail.com'      
          smarthost: 'smtp.gmail.com:587'
          authUsername: 'drs15024@gmail.com'
          authPassword:
            name: alertmanager-email-secret  
            key: password
          requireTLS: true
          sendResolved: true