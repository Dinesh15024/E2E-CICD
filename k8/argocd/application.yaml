apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipl-voter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Dinesh15024/E2E-Devops-Project.git'
    targetRevision: HEAD
    path: k8/helm/ipl-voter
    helm:
      releaseName: ipl-voter
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true